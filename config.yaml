task: "классификация новостных заголовков (tech vs non-tech)"

sources:
  - type: hf_dataset
    name: ag_news
    split: train
    sample: 1500
    label_map:
      0: "negative"   # World
      1: "negative"   # Sports
      2: "negative"   # Business
      3: "positive"   # Sci/Tech

  - type: scrape
    url: "https://news.ycombinator.com"
    selector: ".athing"
    text_selector: ".titleline > a"
    fixed_label: "positive"
    pages: 3
