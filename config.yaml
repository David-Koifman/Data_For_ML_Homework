task: "классификация спам-сообщений (spam=positive, ham=negative)"

sources:
  - type: hf_dataset
    name: sms_spam
    split: train
    sample: 1500
    text_col: sms
    label_map:
      0: "negative"   # ham (нормальное сообщение)
      1: "positive"   # spam

  - type: scrape
    url: "https://quotes.toscrape.com"
    selector: "div.quote"
    text_selector: "span.text"
    fixed_label: "negative"
    pages: 10
